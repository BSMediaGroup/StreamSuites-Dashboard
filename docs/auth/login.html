<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    window.ADMIN_BASE_PATH = (() => {
      const pathname = window.location.pathname || "";
      return pathname === "/docs" || pathname.startsWith("/docs/") ? "/docs" : "";
    })();
  </script>
  <script src="/js/admin-routes.js"></script>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="streamsuites-auth-base" content="https://api.streamsuites.app" />
  <meta name="streamsuites-auth-session" content="https://api.streamsuites.app/auth/session" />
  <meta name="streamsuites-auth-logout" content="https://api.streamsuites.app/auth/logout" />
  <meta name="streamsuites-auth-login" content="https://api.streamsuites.app/auth/login/password" />
  <meta name="streamsuites-auth-google" content="https://api.streamsuites.app/auth/login/google?surface=admin&amp;return_to=https://admin.streamsuites.app/auth/success.html" />
  <meta name="streamsuites-auth-github" content="https://api.streamsuites.app/auth/login/github?surface=admin&amp;return_to=https://admin.streamsuites.app/auth/success.html" />
  <meta name="streamsuites-auth-discord" content="https://api.streamsuites.app/auth/login/discord?surface=admin&amp;return_to=https://admin.streamsuites.app/auth/success.html" />
  <meta name="streamsuites-auth-x" content="https://api.streamsuites.app/auth/x/start?surface=admin&amp;return_to=https://admin.streamsuites.app/auth/success.html" />
  <meta name="streamsuites-auth-twitch" content="https://api.streamsuites.app/oauth/twitch/start" />

  <title>StreamSuites Admin Login</title>
  <link rel="icon" href="/favicon.ico" />

  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/layout.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/overrides.css" />
  <link rel="stylesheet" href="../css/theme-dark.css" />
  <link rel="stylesheet" href="../css/updates.css" />
  <link rel="stylesheet" href="../css/status-widget.css" />
</head>
<body>
  <main style="min-height: 100%; display: flex; align-items: center; justify-content: center; padding: 32px;">
    <div class="admin-auth-card glass-card">
      <h2 class="admin-auth-title">
        <img
          src="../assets/logos/ssblueshield.webp"
          alt="StreamSuites"
          class="admin-auth-title-logo"
        />
        <span>StreamSuites™ Admin Login</span>
      </h2>
      <p class="muted">Use your StreamSuites account to access the admin dashboard.</p>
      <p id="admin-login-reason" class="muted"></p>
      <section id="admin-login-turnstile-panel" class="admin-auth-turnstile" hidden aria-live="polite">
        <div id="admin-login-turnstile" class="admin-auth-turnstile-slot"></div>
        <p id="admin-login-turnstile-status" class="admin-auth-turnstile-status"></p>
      </section>

      <div class="admin-auth-providers">
        <button class="ss-btn ss-btn-primary" data-admin-auth-provider="google">
          <img
            class="admin-auth-provider-icon"
            src="../assets/icons/google.svg"
            alt=""
            aria-hidden="true"
          />
          <span>Continue with Google</span>
        </button>
        <button class="ss-btn ss-btn-secondary" data-admin-auth-provider="github">
          <img
            class="admin-auth-provider-icon"
            src="../assets/icons/github.svg"
            alt=""
            aria-hidden="true"
          />
          <span>Continue with GitHub</span>
        </button>
        <button class="ss-btn ss-btn-secondary" data-admin-auth-provider="discord">
          <img
            class="admin-auth-provider-icon"
            src="../assets/icons/discord.svg"
            alt=""
            aria-hidden="true"
          />
          <span>Continue with Discord</span>
        </button>
        <button class="ss-btn ss-btn-secondary" data-admin-auth-provider="x">
          <img
            class="admin-auth-provider-icon"
            src="../assets/icons/x.svg"
            alt=""
            aria-hidden="true"
          />
          <span>Continue with X</span>
        </button>
        <button class="ss-btn ss-btn-secondary" data-admin-auth-provider="twitch">
          <img
            class="admin-auth-provider-icon"
            src="../assets/icons/twitch.svg"
            alt=""
            aria-hidden="true"
          />
          <span>Continue with Twitch</span>
        </button>
      </div>

      <div class="admin-auth-divider">
        <span>Manual email/password</span>
      </div>

      <div class="admin-auth-manual">
        <button
          id="admin-login-manual-toggle"
          class="ss-btn ss-btn-secondary admin-auth-manual-toggle"
          type="button"
          aria-expanded="false"
          aria-controls="admin-login-manual-panel"
        >
          Use manual email/password
        </button>
        <div id="admin-login-manual-panel" class="admin-auth-manual-panel" hidden>
          <form id="admin-login-form" class="admin-auth-email">
            <label for="admin-login-email">Admin Email</label>
            <div class="admin-auth-email-row">
              <input
                id="admin-login-email"
                name="email"
                type="email"
                placeholder="admin@streamsuites.app"
                autocomplete="email"
                required
              />
              <input
                id="admin-login-password"
                name="password"
                type="password"
                placeholder="Password"
                autocomplete="current-password"
                required
              />
              <button class="ss-btn ss-btn-secondary" type="submit">Sign in</button>
            </div>
            <p class="muted admin-auth-note">
              Use the same StreamSuites email/password flow as the other login surfaces.
            </p>
          </form>
        </div>
      </div>

      <div id="admin-login-status" class="admin-auth-status" role="status" aria-live="polite"></div>
      <nav class="admin-auth-surface-links" aria-label="Alternate login surfaces">
        <span class="admin-auth-surface-links__label">Elsewhere</span>
        <a href="https://streamsuites.app/public-login.html">Public</a>
        <a href="https://creator.streamsuites.app/auth/login.html">Creator</a>
        <a href="https://console.streamsuites.app/login/">Developer</a>
      </nav>
    </div>
  </main>

  <script src="/js/turnstile-inline.js" defer></script>
  <script src="/js/admin-login.js"></script>
  <script src="/js/status-widget.js" defer></script>
</body>
</html>
